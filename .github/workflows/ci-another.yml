name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7.6

      # - name: Don't downgrade me!
      #   uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
